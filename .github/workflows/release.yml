name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build ${{ matrix.target }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            artifact_name: mq-crawl
            asset_name: mq-crawl-x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: mq-crawl.exe
            asset_name: mq-crawl-x86_64-pc-windows-msvc
            archive_ext: zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
          cache: false

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (tar.gz)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          tar czf "${{ matrix.asset_name }}.tar.gz" \
            -C target/${{ matrix.target }}/release "${{ matrix.artifact_name }}"

      - name: Package (zip)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" -DestinationPath "${{ matrix.asset_name }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}.${{ matrix.archive_ext }}

  release:
    needs: build
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: release
          merge-multiple: true

      - name: Create checksums
        run: shasum -a 256 release/* > SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            release/*.tar.gz
            release/*.zip
            SHA256SUMS
