name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build ${{ matrix.target }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            artifact_name: mq-crawl
            asset_name: mq-crawl-x86_64-linux
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: mq-crawl.exe
            asset_name: mq-crawl-x86_64-windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
          cache: false

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf "${GITHUB_WORKSPACE}/${{ matrix.asset_name }}.tar.gz" "${{ matrix.artifact_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ github.workspace }}/${{ matrix.asset_name }}.tar.gz

  release:
    needs: build
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: release

      - name: Create checksums
        run: cd release && shasum -a 256 */* > ../SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            release/*/*.tar.gz
            SHA256SUMS
